<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>👊 - ✋ - Scissors Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="main-card">
    <div class="career-bar">
        <span>Wins: <b id="c-wins">0</b></span>
        <span>Losses: <b id="c-losses">0</b></span>
        <span>Rate: <b id="c-rate">0%</b></span>
        <button id="reset-stats-btn">[RESET STATS]</button>
    </div>

    <h1>R-P-S Game</h1>

    <div class="score-display">
        <div>You <span id="p-score">0</span></div>
        <div>CPU <span id="cpu-score">0</span></div>
    </div>

    <div class="battle-view" id="battle-view">
        <div class="emojis">
            <span id="p-emoji">🤔</span> VS <span id="cpu-emoji">🤖</span>
        </div>
        <div id="result-text">Ready?</div>
    </div>

    <div class="choices">
        <button class="choice-btn" id="rock">👊</button>
        <button class="choice-btn" id="paper">✋</button>
        <button class="choice-btn" id="scissors">✌️</button>
    </div>

    <button class="reset-btn" id="reset-game-btn">Restart Round</button>
</div>

<script src="script.js"></script>
</body>
</html>
